server:
  port: 8080

spring:
  application:
    name: valadir
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:postgresql://localhost:5432/valadir
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

notifications:
  mail:
    from: noreply@valadir.local

verification:
  otp:
    ttl-seconds: 900  # 15 minutes

jwt:
  private-key: ${JWT_PRIVATE_KEY}
  access-token-ttl-seconds: 900     # 15 minutes
  refresh-token-ttl-seconds: 604800 # 7 days

rate-limit:
  enabled: true
  rules:
    # public endpoints
    # --- login: brute-force + credential stuffing ---
    - path: /api/auth/login
      strategy: IP
      max-requests: 10
      window-seconds: 60
    - path: /api/auth/login
      strategy: EMAIL
      max-requests: 5
      window-seconds: 900   # 15 minutes

    # --- register: email enumeration via EMAIL_ALREADY_EXISTS ---
    - path: /api/auth/register
      strategy: IP
      max-requests: 5
      window-seconds: 3600  # 1 hour
    - path: /api/auth/register
      strategy: EMAIL
      max-requests: 3
      window-seconds: 3600  # 1 hour

    # --- verify-email: OTP brute-force + account enumeration via INVALID_VERIFICATION_OTP ---
    - path: /api/auth/verify-email
      strategy: IP
      max-requests: 10
      window-seconds: 60
    - path: /api/auth/verify-email
      strategy: EMAIL
      max-requests: 5
      window-seconds: 900   # matches OTP TTL — window resets when OTP expires

    # --- resend-verification: email spam ---
    - path: /api/auth/resend-verification
      strategy: IP
      max-requests: 5
      window-seconds: 3600  # 1 hour
    - path: /api/auth/resend-verification
      strategy: EMAIL
      max-requests: 3
      window-seconds: 3600  # 1 hour

    # --- refresh: token replay abuse ---
    - path: /api/auth/refresh
      strategy: IP
      max-requests: 30
      window-seconds: 60

    # --- authenticated endpoints: per-user global limit ---
    - path: /api/**
      strategy: USER
      max-requests: 100
      window-seconds: 60
