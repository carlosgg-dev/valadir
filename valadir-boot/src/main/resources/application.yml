server:
  port: 8080

spring:
  application:
    name: valadir
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:postgresql://localhost:5432/valadir
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

notifications:
  mail:
    from: noreply@valadir.local

auth:
  otp:
    ttl: 15m
  lockout:
    window: 1h  # sliding window for counting failed attempts
    thresholds:
      - min-failures: 5
        lockout: 60s
      - min-failures: 10
        lockout: 5m
      - min-failures: 15
        lockout: 30m
  jwt:
    private-key: ${JWT_PRIVATE_KEY}
    access-token-ttl: 15m
    refresh-token-ttl: 7d

rate-limit:
  enabled: true
  rules:
    # public endpoints
    # --- login: brute-force + credential stuffing ---
    - path: /api/auth/login
      strategy: IP
      max-requests: 10
      window: 60s
    - path: /api/auth/login
      strategy: EMAIL
      max-requests: 5
      window: 15m

    # --- register: email enumeration via EMAIL_ALREADY_EXISTS ---
    - path: /api/auth/register
      strategy: IP
      max-requests: 5
      window: 1h
    - path: /api/auth/register
      strategy: EMAIL
      max-requests: 3
      window: 1h

    # --- verify-email: OTP brute-force + account enumeration via INVALID_VERIFICATION_OTP ---
    - path: /api/auth/verify-email
      strategy: IP
      max-requests: 10
      window: 60s
    - path: /api/auth/verify-email
      strategy: EMAIL
      max-requests: 5
      window: 15m  # matches OTP TTL — window resets when OTP expires

    # --- resend-verification: email spam ---
    - path: /api/auth/resend-verification
      strategy: IP
      max-requests: 5
      window: 1h
    - path: /api/auth/resend-verification
      strategy: EMAIL
      max-requests: 3
      window: 1h

    # --- refresh: token replay abuse ---
    - path: /api/auth/refresh
      strategy: IP
      max-requests: 30
      window: 60s

    # --- authenticated endpoints: per-user global limit ---
    - path: /api/**
      strategy: USER
      max-requests: 100
      window: 60s
