server:
  port: 8080

spring:
  application:
    name: valadir
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:postgresql://localhost:5432/valadir
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}

jwt:
  private-key: ${JWT_PRIVATE_KEY}
  access-token-ttl-seconds: 900     # 15 minutes
  refresh-token-ttl-seconds: 604800 # 7 days

rate-limit:
  enabled: true
  rules:
    # --- Public auth endpoints: per-IP limit per endpoint ---
    - path: /api/auth/login
      strategy: IP
      max-requests: 10
      window-seconds: 60
    - path: /api/auth/login
      strategy: EMAIL
      max-requests: 5
      window-seconds: 900   # 15 minutes
    - path: /api/auth/register
      strategy: IP
      max-requests: 5
      window-seconds: 3600  # 1 hour
    - path: /api/auth/refresh
      strategy: IP
      max-requests: 30
      window-seconds: 60
    # --- Authenticated endpoints: per-user limit ---
    - path: /api/**
      strategy: USER
      max-requests: 100
      window-seconds: 60
